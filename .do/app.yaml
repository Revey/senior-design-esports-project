name: campus-rankers
region: nyc

# Managed Postgres cluster bound to the App Platform deployment.
# DO provisions this on first apply and exposes DATABASE_URL automatically
# to any service that references ${db.DATABASE_URL}.
databases:
  - name: db
    engine: PG
    production: false  # set true on cutover for HA + backups
    # Local docker stack runs postgres:18 (Debian) per CONSTITUTION rule. Match
    # the major-version here; if DO doesn't yet expose 18 for managed PG, drop
    # to the highest available (17 or 16) BEFORE cutover and update local
    # docker-compose.yml in lockstep so glibc/collation parity stays intact.
    version: "17"

services:
  - name: backend
    source_dir: Backend
    dockerfile_path: Backend/Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    routes:
      - path: /api
    envs:
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "8000"
      - key: DEBUG
        value: "false"
      - key: DB_POOL_MIN
        value: "1"
      - key: DB_POOL_MAX
        value: "10"
      # Auto-wired by DO from the managed Postgres cluster above.
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      # Admin auth (Phase 3f.1) — set in DO secrets, NOT committed.
      - key: ADMIN_PASSWORD
        scope: RUN_TIME
        type: SECRET
      - key: ADMIN_SECRET
        scope: RUN_TIME
        type: SECRET
      # Riot API + RSO OAuth (Phase 3g + Phase 5) — set in DO secrets.
      - key: RIOT_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: RSO_CLIENT_ID
        scope: RUN_TIME
        type: SECRET
      - key: RSO_CLIENT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: RSO_REDIRECT_URI
        scope: RUN_AND_BUILD_TIME
        value: ${APP_URL}/api/valorant/auth/callback
      - key: SESSION_SECRET
        scope: RUN_TIME
        type: SECRET
      # CORS / frontend coupling — populated automatically by DO.
      - key: FRONTEND_ORIGIN
        scope: RUN_AND_BUILD_TIME
        value: ${frontend.PUBLIC_URL}
      - key: ALLOWED_ORIGINS
        scope: RUN_AND_BUILD_TIME
        value: ${frontend.PUBLIC_URL}
      # Rate-limiting (slowapi default).
      - key: RATE_LIMIT_DEFAULT
        value: "60/minute"

  - name: frontend
    source_dir: Frontend
    dockerfile_path: Frontend/Dockerfile
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    routes:
      - path: /
    envs:
      - key: NEXT_PUBLIC_BACKEND_URL
        scope: BUILD_TIME
        value: ${backend.PUBLIC_URL}
